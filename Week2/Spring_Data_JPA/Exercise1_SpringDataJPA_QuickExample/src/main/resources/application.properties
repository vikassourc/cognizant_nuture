# =============================================================================
# Spring Boot Application Properties
# Cognizant Nurture - Week 2 | Spring Data JPA Quick Example
# =============================================================================

# -----------------------------------------------------------------------------
# Application Name
# -----------------------------------------------------------------------------
spring.application.name=spring-data-jpa-quick-example

# -----------------------------------------------------------------------------
# H2 In-Memory Data Source Configuration
# jdbc:h2:mem:<dbname>  -> keeps the DB alive for the duration of the session
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:employeedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# -----------------------------------------------------------------------------
# JPA / Hibernate Configuration
# create-drop  -> creates schema on startup, drops on shutdown (perfect for demo)
# show-sql     -> prints every SQL statement to console
# format_sql   -> pretty-prints multi-line SQL for readability
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# -----------------------------------------------------------------------------
# H2 Web Console
# Accessible at http://localhost:8080/h2-console while the app is running
# JDBC URL to enter in console: jdbc:h2:mem:employeedb
# -----------------------------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -----------------------------------------------------------------------------
# Logging - reduce noise from Spring Framework internals
# -----------------------------------------------------------------------------
logging.level.org.springframework=WARN
logging.level.com.cognizant=DEBUG
