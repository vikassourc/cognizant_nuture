server:
  port: 8081

spring:
  application:
    name: account-service          # Name registered with Eureka

  # ── H2 In-Memory Database ──────────────────────────────────────────
  datasource:
    url: jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console            # http://localhost:8081/h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop        # Re-create schema on each start
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# ── Eureka Client Configuration ────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# ── Actuator ───────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: Account Microservice
    description: Manages bank account operations
    version: 1.0.0

logging:
  level:
    com.cognizant.accountservice: DEBUG
