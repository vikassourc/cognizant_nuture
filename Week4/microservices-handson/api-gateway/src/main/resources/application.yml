server:
  port: 8080                       # API Gateway – single entry point for all clients

spring:
  application:
    name: api-gateway

  # ── Spring Cloud Gateway Routes ──────────────────────────────────────
  cloud:
    gateway:
      # Global CORS configuration
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"

      routes:

        # ── Route 1: Account Service ────────────────────────────────────
        #   Path: /account-service/**
        #   Strips the prefix /account-service before forwarding
        #   Target: lb://account-service (resolved via Eureka)
        - id: account-service-route
          uri: lb://account-service
          predicates:
            - Path=/account-service/**
          filters:
            - StripPrefix=1           # Removes /account-service prefix
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - AddResponseHeader=X-Served-By, api-gateway

        # ── Route 2: Loan Service ───────────────────────────────────────
        #   Path: /loan-service/**
        #   Target: lb://loan-service (resolved via Eureka)
        - id: loan-service-route
          uri: lb://loan-service
          predicates:
            - Path=/loan-service/**
          filters:
            - StripPrefix=1
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - AddResponseHeader=X-Served-By, api-gateway

# ── Eureka Client ────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10

# ── Actuator ─────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    com.cognizant.apigateway: DEBUG
    org.springframework.cloud.gateway: INFO
